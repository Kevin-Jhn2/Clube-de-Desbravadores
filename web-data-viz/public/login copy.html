<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styleLogin.css">
    <title>Login</title>
    <script src="./js/sessao.js"></script>

</head>
<body>
    <nav>
        <ul><a href="index.html">Home</a></ul> 
        <ul><a href="cadastro.html">Cadastro</a></ul>
        <ul><a href="login.html">Login</a></ul>
    </nav>
    <header></header>
    <main>
        <section>
            <div class="login">
                <div class="alerta_erro">
                    <div class="card_erro" id="cardErro">
                    <span id="mensagem_erro"></span>
                </div>
            </div>
                <h1>Login</h1>
                <div class="inputs">
                    <div><input type="text" id="ipt_usuario" placeholder="nome de usuario"></div>
                    <div><input type="text" id="ipt_email" placeholder="email"></div>
                    <div><input type="text" id="ipt_senha" placeholder="senha"></div>
                    <div><button onclick="login()">Login</button></div>

                    <div id="div_aguardar" class="loading-div">
                        <img src="./assets/circle-loading.gif" id="loading-gif">
                    </div>

                    <div id="div_erros_login"></div>

                </div>
            </div>
        </section>
    </main>
    <footer></footer>
</body>
</html>
<script>

    function login(){
        aguardar();
        var usuarioVar = ipt_usuario.value;
        var emailVar = ipt_email.value;
        var senhaVar = ipt_senha.value;

        if (emailVar == "" || senhaVar == "" || usuarioVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM USUARIO: ", usuarioVar);
        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar,
                usuarioServer: usuarioVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.UNIDADES = JSON.stringify(json.unidades) 
                    // sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)

                    setTimeout(function () {
                        window.location = "./dashboard/cards.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
