<!-- Esse daqui tem como objetivo ser a tela de reunião, onde a pessoa pode:
 adicionar unidades, adicionar pessoas nas unidades e adicionar pontos para cada pessoa,
 podendo ter uma descrição do que é aquela pontuação (tendo uns exemplos ao lado). É uma tela simples,
 devo focar mais na lógica do que no CSS, afinal é isso que vai contar -->
<body>
    <div>
        <h3>Adicionar novas unidades</h3>
        <input type="text" id="iptUnidade" placeholder="Nome da Unidade">
        <button onclick="addunidades()">Adicionar Unidades</button>
    </div>
    <div>
        <h3>Adicionar membro em unidade</h3>
        <input type="text" id="iptMembro" placeholder="Nome completo do membro">
        <input type="text" id="ipt_unidade" placeholder="Nome da Unidade">
        <button onclick="addmembros()">Adicionar membros</button>
        
    </div>
    <div>
        <h3>Adicionar pontos a membros</h3>
        <input type="text" id="iptPonto" placeholder="Quantidade de pontos">
        <button onclick="addpontos()">Adicionar Pontos</button>
    </div>
</body>
</html>

    function addunidades(){

        let unidade = {
            nome: nomeUnidade,
            membros: [],
            Pontos: 0
        }
        // Adicionar unidade, verificando se há replica e se os campos foram preenchidos
        if(nomeUnidade == ""){

                if(elementoUnidade.nome.toLowerCase() == nomeUnidade.toLowerCase()){
                    duplicata = true;
                    break;
                };
            };
            console.log(duplicata)
            if(duplicata == false){

        };
    };
